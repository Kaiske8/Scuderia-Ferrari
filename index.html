<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiske8 | Scuderia Ferrari Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- The Top Navigation Bar -->
    <header class="ferrari-navbar">
        <button class="menu-btn" type="button">MENU</button>

        <div class="logo-container">
            <a href="#" aria-label="Ferrari Homepage">
                <img src="ferrari-logo.png" alt="Ferrari Logo" class="navbar-logo">
            </a>
        </div>

        <div class="nav-actions">
            <a href="#" class="nav-link">F1</a>
            <a href="#" class="nav-link">NEWS</a>
            <a href="#" class="nav-link">SHOP</a>
        </div>
    </header>

    <main class="hero-section">
        <section class="hero-content">
            <h1>Scuderia Ferrari</h1>
            <p>Welcome to the home of Ferrari Formula 1 passion.</p>
        </section>
        <section class="driver-cards">
            <article class="driver-card">
                <img src="lewis.jpg" alt="Lewis Hamilton" class="driver-photo">
                <div class="card-copy">
                    <span class="driver-role">Driver</span>
                    <h2>Lewis Hamilton</h2>
                    <p>Seven-time World Champion with a fierce racing legacy.</p>
                    <a href="#" class="card-link">Read More</a>
                </div>
            </article>
            <article class="driver-card">
                <img src="charles.jpg" alt="Charles Leclerc" class="driver-photo">
                <div class="card-copy">
                    <span class="driver-role">Driver</span>
                    <h2>Charles Leclerc</h2>
                    <p>Young and talented, a rising star in the world of Formula 1.</p>
                    <a href="#" class="card-link">Read More</a>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
